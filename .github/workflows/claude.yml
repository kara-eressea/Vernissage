name: Claude

# Responds when someone mentions @claude in an issue, PR, or review comment —
# e.g. "@claude why does this fail?" or "@claude add a test for the zero-entrant
# draw". Claude acts with the repo checked out and can push changes to the PR.
#
# Requires the same ANTHROPIC_API_KEY repository secret and Claude GitHub App as
# the review workflow. The job only runs when the trigger phrase is present.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      # Required: the action exchanges a GitHub OIDC token for its App token.
      id-token: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          # Provide both; the action uses whichever secret is set.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"

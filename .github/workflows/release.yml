name: Release

# Build and publish a container image to the GitHub Container Registry
# (ghcr.io) whenever a version tag is pushed. Cut a release by tagging a commit:
#
#   git tag v0.1.0
#   git push origin v0.1.0
#
# The image is published as ghcr.io/mtaanquist/vernissage with tags derived from
# the version (for example 0.1.0, 0.1, 0, and latest for the newest stable
# release). Pre-release tags such as v0.1.0-rc.1 are published but do not move
# the latest tag.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # QEMU lets the amd64 runner also build the arm64 image (better-sqlite3 is
      # compiled from source per architecture, see the Dockerfile).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mtaanquist/vernissage
          # latest=auto (the default) tags `latest` only for a stable release,
          # never for a pre-release.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push the image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

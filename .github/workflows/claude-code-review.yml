name: Claude Code Review

# Runs an independent, fresh-context Claude review on every pull request.
# Complements the CI `test` check: CI proves the suite is green; this reviews
# the change for correctness and adherence to the project's conventions.
#
# Requires an ANTHROPIC_API_KEY repository secret (Settings -> Secrets and
# variables -> Actions) and the Claude GitHub App installed on the repo. Until
# the secret is set the job will fail; it is not a required status check, so it
# does not block merges.

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      # Required: the action exchanges a GitHub OIDC token for its App token.
      id-token: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          # Provide both; the action uses whichever secret is set (an
          # API-key install populates the first, a Claude-subscription /
          # install-github-app populates the second). The empty one is ignored.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 20"
          prompt: |
            Review this pull request for the Vernissage project, an auditable,
            activity-gated Discord raffle bot. Read CLAUDE.md and docs/design.md
            first — they are the source of truth for the raffle lifecycle,
            eligibility rules, data model, and the provably-fair draw.

            Prioritise, in order:
            1. Correctness bugs — logic errors and edge cases, especially UTC
               day/window boundaries, the eligibility check ordering, cooldown
               math, and draw determinism given a seed.
            2. Convention violations from CLAUDE.md — core logic must be pure
               functions with no Discord dependencies (the Discord layer only
               parses, calls, and formats); timestamps stored in UTC ISO; never
               store message content, only counts; every raffle/entry/blacklist
               state change writes an audit_log row; new logic requires tests.
            3. Clear simplifications or missing test coverage.

            Post inline comments only for issues you are confident a maintainer
            would act on. Be precise; skip style nitpicks. If the PR looks good,
            say so briefly.
